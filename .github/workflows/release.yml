# 工作流: 公开仓 ctz168/pluginAICQ 发布流程
# 1. 自动递增版本号（patch）
# 2. 将测试域名 acer.tunnel.aicq.online 替换为正式域名 aicq.online
# 3. 发布 openclaw-plugin (Node.js) 到 npm
# 4. 将版本号回推到公开仓
name: Build and Release Plugin

on:
  push:
    branches: [main]
    paths:
      - 'openclaw-plugin/**'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch / minor / major)'
        required: false
        default: 'patch'

jobs:
  release-npm:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for pushing version bump back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLIC_REPO_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Determine version bump type
        id: version
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP"

      - name: Bump version
        run: |
          cd openclaw-plugin
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump version (no git tag, we commit manually)
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version

          NEW=$(node -p "require('./package.json').version")
          echo "New version: $NEW"

          # Also update openclaw.plugin.json version to match
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const plugin = JSON.parse(fs.readFileSync('./openclaw.plugin.json', 'utf8'));
            plugin.version = pkg.version;
            fs.writeFileSync('./openclaw.plugin.json', JSON.stringify(plugin, null, 2) + '\n');
            console.log('Synced openclaw.plugin.json version to ' + pkg.version);
          "

      - name: Replace tunnel domain with production domain
        run: |
          # Replace acer.tunnel.aicq.online with aicq.online in all source files
          # This ensures the public release connects to the production server
          find openclaw-plugin -type f \( -name "*.js" -o -name "*.json" -o -name "*.md" \) -exec \
            sed -i 's/acer\.tunnel\.aicq\.online/aicq.online/g' {} +

          echo "Domain replacement complete"

          # Verify no remaining tunnel references
          if grep -r "acer\.tunnel\.aicq\.online" openclaw-plugin/ 2>/dev/null; then
            echo "WARNING: Still found acer.tunnel.aicq.online references!"
            exit 1
          else
            echo "No tunnel domain references remaining - clean"
          fi

      - name: Install dependencies
        run: |
          cd openclaw-plugin
          npm ci

      - name: Publish to npm
        run: |
          cd openclaw-plugin
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and push version bump
        run: |
          cd openclaw-plugin
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ..
          git config user.name "aicq-bot"
          git config user.email "bot@aicq.online"
          git add openclaw-plugin/package.json openclaw-plugin/openclaw.plugin.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push origin main
          echo "Version bump pushed: v${NEW_VERSION}"
